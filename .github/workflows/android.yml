name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Verify project structure
      run: |
        echo "=== Project files ==="
        ls -la
        echo "=== App files ==="
        ls -la app/
        echo "=== Gradle wrapper ==="
        ls -la gradle/wrapper/
        echo "=== Android SDK ==="
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls $ANDROID_HOME/platforms/ || echo "No platforms found"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myVPNproject-debug-build${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.01-b${{ github.run_number }}"
        name: "Release v1.01 (build ${{ github.run_number }})"
        body: "Automated build from GitHub Actions. Debug APK for DPI bypass VPN."
        files: app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
